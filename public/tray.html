<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Launchpad</title>
<style>
  :root {
    --card: #ffffff; --line: #e5e8ee; --line-2: #d3d9e2;
    --text: #1c2129; --dim: #5b6572; --faint: #99a2ae;
    --blue: #2563eb; --blue-bg: #eef3fe;
    --green: #158f54; --green-bg: #e8f6ef;
    --red: #d24343; --red-bg: #fdeeee;
    --mono: 'Cascadia Code', Consolas, ui-monospace, monospace;
    --sans: 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: transparent; }
  body { font-family: var(--sans); font-size: 13px; color: var(--text); padding: 10px; -webkit-font-smoothing: antialiased; }

  .pop {
    height: 100%; display: flex; flex-direction: column;
    background: var(--card); border: 1px solid var(--line-2); border-radius: 12px;
    box-shadow: 0 10px 34px -4px rgba(15, 25, 45, .35);
    overflow: hidden;
  }
  .head {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    border-bottom: 1px solid var(--line); background: #fafbfd; flex: none;
  }
  .head img { width: 15px; height: 15px; border-radius: 3px; }
  .head .t { font-size: 12px; font-weight: 650; }
  .head .n { margin-left: auto; font-size: 11px; color: var(--faint); }

  .list { flex: 1; overflow-y: auto; }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd3de; border: 3px solid transparent; border-radius: 8px; background-clip: padding-box; }

  .row { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: #cfd6df; }
  .dot.running { background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }
  .dot.starting { background: #e2a63d; animation: pulse 1s infinite; }
  .dot.stale, .dot.error { background: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }
  @keyframes pulse { 50% { opacity: .35; } }
  .nm { flex: 1; min-width: 0; font-weight: 600; font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .shared { font-size: 10px; color: var(--blue); font-weight: 650; letter-spacing: .06em; flex: none; }

  .ib {
    width: 26px; height: 26px; border: 1px solid var(--line-2); border-radius: 6px;
    background: var(--card); color: var(--dim); cursor: pointer; flex: none;
    display: grid; place-items: center; font-size: 12px; padding: 0;
  }
  .ib:hover { color: var(--text); border-color: #b9c2cf; }
  .ib.blue:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-bg); }
  .ib.red:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }
  .ib svg { width: 12px; height: 12px; }

  .empty { padding: 34px 16px; text-align: center; color: var(--faint); font-size: 12.5px; line-height: 1.7; }

  .foot { display: flex; gap: 7px; padding: 9px 10px; border-top: 1px solid var(--line); background: #fafbfd; flex: none; }
  .btn {
    flex: 1; font-family: var(--sans); font-size: 12px; font-weight: 550; padding: 5px 8px;
    border-radius: 6px; border: 1px solid var(--line-2); background: var(--card); color: var(--dim);
    cursor: pointer; white-space: nowrap;
  }
  .btn:hover { color: var(--text); border-color: #b9c2cf; }
  .btn.blue { color: var(--blue); border-color: #c3d4f7; }
  .btn.blue:hover { background: var(--blue-bg); }
  .btn.red { flex: 0 0 auto; color: var(--red); border-color: #eecbcb; }
  .btn.red:hover { background: var(--red-bg); }

  .toast {
    position: fixed; left: 50%; bottom: 60px; transform: translate(-50%, 6px);
    background: #22272f; color: #f0f3f6; border-radius: 6px; padding: 6px 12px; font-size: 11.5px;
    opacity: 0; transition: .15s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
<div class="pop">
  <div class="head">
    <img src="/icon-64.png" alt="">
    <span class="t">Running now</span>
    <span class="n" id="count"></span>
  </div>
  <div class="list" id="list"><div class="empty">connecting…</div></div>
  <div class="foot">
    <button class="btn blue" id="open">Open Launchpad</button>
    <button class="btn red" id="stopall">Stop all</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
let lastSig = null;

function toast(m) {
  const t = $('#toast'); t.textContent = m; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), 1600);
}

const ICONS = {
  open: '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M5 2H2v8h8V7"/><path d="M7 1h4v4M11 1 5.5 6.5"/></svg>',
  copy: '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="4" y="4" width="7" height="7" rx="1"/><path d="M8 4V2a1 1 0 0 0-1-1H2a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h2"/></svg>',
  renew: '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M10.5 6a4.5 4.5 0 1 1-1.3-3.2M10.5 1v2.5H8"/></svg>',
  stop: '<svg viewBox="0 0 12 12"><rect x="2.5" y="2.5" width="7" height="7" rx="1" fill="currentColor"/></svg>',
};

function dotCls(p) {
  if (p.tunnel.status === 'stale' || p.server.status === 'error') return 'stale';
  if (p.server.status === 'starting' || p.tunnel.status === 'starting') return 'starting';
  if (p.server.status === 'running') return 'running';
  return '';
}

async function poll() {
  let s;
  try { s = await fetch('/api/state').then(r => r.json()); }
  catch (e) { $('#list').innerHTML = '<div class="empty">Launchpad is closed</div>'; return; }
  const active = s.projects.filter(p => p.server.status !== 'stopped' || p.tunnel.status !== 'stopped');
  $('#count').textContent = active.length ? active.length + ' active' : '';

  const sig = JSON.stringify(active.map(p => [p.name, p.server.status, p.tunnel.status, p.tunnel.url, p.localUrl]));
  if (sig === lastSig) return;
  lastSig = sig;

  if (!active.length) {
    $('#list').innerHTML = '<div class="empty">Nothing is running.<br>Open Launchpad to start a project.</div>';
    return;
  }
  $('#list').innerHTML = active.map(p => {
    let btns = '';
    if (p.localUrl) btns += `<button class="ib blue" data-open="${esc(p.localUrl)}" title="Open in browser">${ICONS.open}</button>`;
    if (p.tunnel.url && p.tunnel.status === 'running')
      btns += `<button class="ib blue" data-copy="${esc(p.tunnel.url)}" title="Copy the public link">${ICONS.copy}</button>`;
    if (p.tunnel.status === 'running' || p.tunnel.status === 'stale')
      btns += `<button class="ib blue" data-renew="${esc(p.name)}" title="Fresh public link">${ICONS.renew}</button>`;
    btns += `<button class="ib red" data-stop="${esc(p.name)}" title="Stop">${ICONS.stop}</button>`;
    const shared = p.tunnel.status === 'running' ? '<span class="shared">SHARED</span>'
      : p.tunnel.status === 'stale' ? '<span class="shared" style="color:var(--red)">LINK LOST</span>' : '';
    return `<div class="row"><span class="dot ${dotCls(p)}"></span><span class="nm">${esc(p.name)}</span>${shared}${btns}</div>`;
  }).join('');
}

document.addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  const post = (url, body) => fetch(url, { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body) }).then(() => { lastSig = null; setTimeout(poll, 250); });
  if (b.dataset.open) { window.shell ? window.shell.openExternal(b.dataset.open) : window.open(b.dataset.open); }
  else if (b.dataset.copy) { navigator.clipboard.writeText(b.dataset.copy).then(() => toast('Public link copied')); }
  else if (b.dataset.renew) { post('/api/renew', { name: b.dataset.renew }); toast('Getting a fresh link…'); }
  else if (b.dataset.stop) { post('/api/stop', { name: b.dataset.stop, server: true, tunnel: true }); }
  else if (b.id === 'open') { window.shell && window.shell.showMain(); }
  else if (b.id === 'stopall') { post('/api/stopall', {}); toast('Everything stopped'); }
});

poll();
setInterval(poll, 1500);
</script>
</body>
</html>
